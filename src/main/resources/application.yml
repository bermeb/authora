server:
  forward-headers-strategy: native
  tomcat:
    remoteip:
      internal-proxies: >-
        10\.\d{1,3}\.\d{1,3}\.\d{1,3}|
        172\.1[6-9]\.\d{1,3}\.\d{1,3}|172\.2\d\.\d{1,3}\.\d{1,3}|172\.3[01]\.\d{1,3}\.\d{1,3}|
        192\.168\.\d{1,3}\.\d{1,3}|
        127\.\d{1,3}\.\d{1,3}\.\d{1,3}

spring:
  application:
    name: authora
  datasource:
    url: ${DB_URL:jdbc:h2:mem:authoradb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 12
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_TLS:false}

authora:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_32_OR_MORE_CHARS}
    access-token-expiration-minutes: ${JWT_EXPIRY_MINUTES:15}
    issuer: ${JWT_ISSUER:auth-service}
  refresh-token:
    expiration-days: ${RT_EXPIRY_DAYS:30}
    max-per-user: ${RT_MAX_PER_USER:5}
    rotate-on-use: ${RT_ROTATE:true}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    login-attempts-per-minute: ${RATE_LIMIT_RPM:10}
    max-failed-attempts: ${RATE_LIMIT_MAX_FAILURES:5}
    lock-duration-minutes: ${LOCK_DURATION_MINUTES:15}
  password-policy:
    min-length: ${PW_MIN_LENGTH:10}
    require-uppercase: ${PW_REQUIRE_UPPER:true}
    require-lowercase: ${PW_REQUIRE_LOWER:true}
    require-numbers: ${PW_REQUIRE_DIGIT:true}
    require-special-characters: ${PW_REQUIRE_SPECIAL:true}
    reset-token-expiry-minutes: ${PW_RESET_EXPIRY_MINUTES:30}
    pepper: ${PW_PEPPER:dev-pepper-do-not-use-in-production-min32chars}
  email:
    from-address: ${EMAIL_FROM:noreply@example.com}
    from-name: ${EMAIL_FROM_NAME:Auth Service}
    application-name: ${APP_NAME:MyApp}
    base-url: ${APP_BASE_URL:http://localhost:8080}
  features:
    oauth2-enabled: ${FEATURE_OAUTH2:true}
    email-verification-required: ${FEATURE_EMAIL_VERIFY:true}
    audit-log-enabled: ${FEATURE_AUDIT_LOG:true}
    oauth2-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}
  cors:
    allowed-origins:
      - ${CORS_ORIGIN:http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.bermeb.authora: INFO
    org.springframework.security: WARN